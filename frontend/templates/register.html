{% extends 'index.html' %}

{% block navbar %}
  <li><a class="nav-link text-sm font-medium text-slate-300 hover:text-white transition-colors" href="{{ url_for('index') }}">Home</a></li>
  <li><a class="nav-link active text-sm font-medium text-white" href="{{ url_for('register') }}">Register</a></li>
  <li>
    <a href="{{ url_for('login') }}" class="btn-primary px-5 py-2 rounded-full text-sm font-semibold text-white">Login</a>
  </li>
{% endblock %}

{% block content %}
<section class="min-h-screen flex items-center justify-center relative overflow-hidden">
  <div class="absolute top-1/4 right-1/3 w-96 h-96 bg-accent/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/3 left-1/4 w-72 h-72 bg-primary/15 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md mx-auto px-6">
    <div class="glow-card rounded-3xl p-8">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="w-14 h-14 btn-primary rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-white">Create account</h1>
        <p class="text-slate-400 text-sm mt-1">Join NeuroScan AI today</p>
      </div>

      <!-- Form -->
      <form action="{{ url_for('register') }}" method="post" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Full name</label>
          <input type="text" name="name" placeholder="John Doe" required
            class="input-field w-full px-4 py-3 rounded-xl text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Email address</label>
          <input type="email" name="email" placeholder="you@example.com" required
            class="input-field w-full px-4 py-3 rounded-xl text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Password</label>
          <input type="password" name="password" placeholder="••••••••" required
            class="input-field w-full px-4 py-3 rounded-xl text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-400 mb-1.5">Confirm password</label>
          <input type="password" name="c_password" placeholder="••••••••" required
            class="input-field w-full px-4 py-3 rounded-xl text-sm">
        </div>

        {% if message %}
        <div class="bg-red-500/10 border border-red-500/30 rounded-xl px-4 py-3 text-red-400 text-sm">
          {{ message }}
        </div>
        {% endif %}

        <button type="submit"
          class="btn-primary w-full py-3 rounded-xl font-semibold text-white text-sm mt-2">
          Create Account
        </button>
      </form>

      <p class="text-center text-slate-500 text-sm mt-6">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-primary-light hover:text-white transition-colors font-medium">Sign in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
